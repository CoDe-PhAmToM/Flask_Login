{% extends 'base.html' %}

{% block title %}Iniciar sesión - ClinicVet{% endblock %}

{% block contenido %}
<div class="container mt-5" style="max-width:420px">
    <h3>Iniciar sesión</h3>
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" value="{{ username or '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <button class="cv-btn cv-btn--primary" type="submit">Entrar</button>
            <a href="{{ url_for('register') }}">Crear cuenta</a>
        </div>
    </form>
</div>
{% endblock %}
